services:
  # ── PostgreSQL 16 ──────────────────────────────────────────────────
  dyventory_db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dyventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────
  dyventory_redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Laravel API (PHP-FPM) ──────────────────────────────────────────
  dyventory_api:
    build:
      context: .
      dockerfile: infra/api/Dockerfile
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - ./backend/storage:/var/www/html/storage
    environment:
      - APP_ENV=local
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=stoky
      - DB_USERNAME=postgres
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
      - SANCTUM_STATEFUL_DOMAINS=localhost:3000
    depends_on:
      dyventory_db:
        condition: service_healthy
      dyventory_redis:
        condition: service_healthy

  # ── Nginx ─────────────────────────────────────────────────────────
  dyventory_nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - dyventory_api

  # ── Laravel Horizon (queue worker) ────────────────────────────────
  dyventory_horizon:
    build:
      context: .
      dockerfile: infra/api/Dockerfile
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan horizon
    volumes:
      - ./backend:/var/www/html
    environment:
      - APP_ENV=local
      - DB_HOST=db
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
    depends_on:
      - dyventory_api
      - dyventory_redis

  # ── Laravel Scheduler ─────────────────────────────────────────────
  dyventory_scheduler:
    build:
      context: .
      dockerfile: infra/api/Dockerfile
    restart: unless-stopped
    working_dir: /var/www/html
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    volumes:
      - ./backend:/var/www/html
    environment:
      - APP_ENV=local
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      - dyventory_api

  # ── Next.js Frontend ───────────────────────────────────────────────
  dyventory_frontend:
    build:
      context: ./dyventory-web
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - API_INTERNAL_URL=http://nginx
    depends_on:
      - dyventory_nginx

volumes:
  db_data:
  redis_data:
